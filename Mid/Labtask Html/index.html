<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Confirmation Form</title>
</head>
<body>
    <h2>Internship Confirmation Form</h2>

    <form>
        <label for="name">Student Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="emai">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label>Preferred Internship Type:</label><br>
        <input type="radio" id="onsite" name="internship_type" value="On-Site">
        <label for="onsite">On-Site</label><br>

        <input type="radio" id="remote" name="internship_type" value="Remote">
        <label for="remote">Remote</label><br><br>
    </form>
</body>
</html>
